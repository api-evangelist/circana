  - type: Features
    data:
      - name: Liquid Data Platform
        description: >-
          Cross-industry data and advanced analytics platform deployable across
          Azure, AWS, Google Cloud, and Oracle Cloud environments.
      - name: Liquid AI
        description: >-
          Next-generation intelligence platform leveraging generative AI to
          accelerate decision-making and shift focus from hindsight to foresight.
      - name: Conversational AI
        description: >-
          AI embedded into Unify+ allowing teams to automate routine analysis
          and reduce time to insight.
      - name: Complete Market Measurement
        description: >-
          Robust POS measurement for in-store and online sales with fulfillment
          type breaks and UPC details.
      - name: Consumer Panel Data
        description: >-
          360-degree view of U.S. buyers tracking purchases across channels with
          POS-aligned panel insights.
      - name: Intelligence Suite Connectors
        description: >-
          Hundreds of pre-built connectors for Azure, Snowflake, AWS, Google
          BigQuery, and Databricks integration.
      - name: Purchase-Based Audiences
        description: >-
          Build and activate audiences using deterministic purchase data for
          precision marketing.
      - name: Price Elasticity Modeling
        description: >-
          AI models with granular store-level data to quantify price elasticity
          and promotional efficiency.
      - name: Cross-Industry Coverage
        description: >-
          Coverage of $4T+ in global consumer spending across 26 industries in
          23 countries.
      - name: Predictive Market Structure
        description: >-
          Industry-only predictive market structure based on actual shopper
          behavior for new product forecasts within 10% accuracy.
  - type: UseCases
    data:
      - name: Market Share Tracking
        description: >-
          Track brand and category performance across retail channels with POS
          and panel data to understand competitive positioning.
      - name: New Product Innovation
        description: >-
          Validate new product concepts with custom simulations and predictive
          market structure analysis to prioritize winning ideas.
      - name: Pricing Optimization
        description: >-
          Optimize pricing strategies using AI-driven elasticity models and
          store-level data to maximize revenue and margin.
      - name: Promotional Planning
        description: >-
          Plan and evaluate trade promotions with quantified ROI metrics and
          scenario modeling for smarter promotional spending.
      - name: Consumer Segmentation
        description: >-
          Segment consumers by behavior, demographics, and purchase patterns to
          tailor marketing and product strategies.
      - name: Retail Media Measurement
        description: >-
          Measure retail media campaign performance linking advertising spend to
          actual sales outcomes for improved ROAS.
      - name: Assortment Optimization
        description: >-
          Optimize product mix by category, store, and geography to improve
          shelf efficiency and drive sales growth.
      - name: Supply Chain Visibility
        description: >-
          Monitor near-real-time cross-retailer inventory and distribution data
          to spot risks and gaps early.
      - name: Audience Activation
        description: >-
          Build purchase-based audience segments and activate them across
          publishers and media platforms in minutes.
      - name: Foodservice Intelligence
        description: >-
          Unite retail, CPG, foodservice, and consumption data for a complete
          picture of food and beverage market dynamics.
  - type: Integrations
    data:
      - name: Snowflake
        description: >-
          Access Circana POS and panel data directly within Snowflake Data Cloud
          for seamless data sharing and collaboration.
      - name: Microsoft Azure
        description: >-
          Deploy Liquid Data platform on Azure for cloud-native data integration
          and analytics workflows.
      - name: Amazon Web Services
        description: >-
          Deploy Liquid Data platform on AWS for scalable cloud analytics and
          data processing.
      - name: Google BigQuery
        description: >-
          Connect Circana data to Google BigQuery for large-scale analytics and
          machine learning workloads.
      - name: Databricks
        description: >-
          Integrate Circana data with Databricks for advanced analytics, data
          engineering, and AI model training.
      - name: LiveRamp
        description: >-
          Collaborate on RampIDs with Circana purchase data in Snowflake for
          privacy-safe audience targeting.
      - name: Oracle Cloud
        description: >-
          Deploy Liquid Data platform on Oracle Cloud for enterprise-grade data
          processing and analytics.
      - name: Google Cloud Platform
        description: >-
          Deploy Liquid Data platform on GCP for cloud-based analytics and data
          integration.
