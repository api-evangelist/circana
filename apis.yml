  complexity of consumer behavior, providing data-driven insights, analytics,
  and technology solutions that help almost 7,000 brands and retailers
  understand and predict consumer purchasing patterns across retail, CPG,
  beauty, foodservice, healthcare, and technology sectors covering $4T+ in
  global consumer spending across 26 industries.
