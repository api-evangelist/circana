provider: Circana
providerId: circana
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Consumer Data
  - CPG
  - Market Research
  - Retail
description: Circana (formerly IRI and The NPD Group) does not publish list pricing for its market
  intelligence products or for Liquid Data, Liquid Data Go, Unify+, Intelligence Suite, or any of
  the Complete category APIs. Pricing is custom per client and is shaped by data scope (categories,
  geographies, panels), refresh cadence (POS frequency), seat count, and integration channel
  (Snowflake, BigQuery, Databricks, BYO cloud). All commercial engagements are managed through
  Circana sales / account teams.
notes: No public pricing page is available. Commercial terms are negotiated per client.
sources:
  - https://www.circana.com/
  - https://www.circana.com/solutions
  - https://www.circana.com/contact
plans:
  - id: circana-enterprise-subscription
    name: Circana Enterprise Subscription
    type: enterprise
    description: Custom-priced subscription to one or more Circana solution families. APIs and data
      access are bundled into the subscription; no per-call price is published.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact Circana sales
        userMultiplied: false
      - label: Data scope
        name: data_scope
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: scoped per category / market / panel selection
        userMultiplied: false
      - label: Seats
        name: seats
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: per agreed seat schedule
        userMultiplied: true
      - label: Cloud / data-share integration
        name: integration
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with subscription (Snowflake, BigQuery, Databricks, etc.)
        userMultiplied: false
    elements:
      - name: Liquid Data platform
      - name: Unify+
      - name: Intelligence Suite
      - name: Liquid Data Go
      - name: Complete Market / Consumer / Beauty / Food & Beverage
      - name: Liquid Activation
      - name: Price and Promotion
      - name: Retail Media
      - name: Account management and analyst services
