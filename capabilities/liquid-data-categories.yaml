naftiko: 1.0.0-alpha2
info:
  label: Circana Liquid Data API — Categories
  description: 'Circana Liquid Data API — Categories. 2 operations. Lead operation: Circana List Categories. Self-contained
    Naftiko capability covering one Circana business surface.'
  tags:
  - Circana
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIRCANA_API_KEY: CIRCANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: liquid-data-categories
    baseUri: https://api.circana.com/liquid-data/v1
    description: Circana Liquid Data API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: categories
      path: /categories
      operations:
      - name: listcategories
        method: GET
        description: Circana List Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent_id
          in: query
          type: string
          description: Parent category ID to list subcategories
        - name: industry
          in: query
          type: string
          description: Industry vertical filter
        - name: search
          in: query
          type: string
          description: Search term to filter categories
    - name: categories-category_id
      path: /categories/{category_id}
      operations:
      - name: getcategory
        method: GET
        description: Circana Get Category Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category_id
          in: path
          type: string
          description: Unique category identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.CIRCANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: liquid-data-categories-rest
    port: 8080
    description: REST adapter for Circana Liquid Data API — Categories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for categories.
      operations:
      - method: GET
        name: listcategories
        description: Circana List Categories
        call: liquid-data-categories.listcategories
        with:
          parent_id: rest.parent_id
          industry: rest.industry
          search: rest.search
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/{category-id}
      name: categories-category-id
      description: REST surface for categories-category_id.
      operations:
      - method: GET
        name: getcategory
        description: Circana Get Category Details
        call: liquid-data-categories.getcategory
        with:
          category_id: rest.category_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: liquid-data-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Circana Liquid Data API — Categories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: circana-list-categories
      description: Circana List Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: liquid-data-categories.listcategories
      with:
        parent_id: tools.parent_id
        industry: tools.industry
        search: tools.search
      outputParameters:
      - type: object
        mapping: $.
    - name: circana-get-category-details
      description: Circana Get Category Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: liquid-data-categories.getcategory
      with:
        category_id: tools.category_id
      outputParameters:
      - type: object
        mapping: $.
