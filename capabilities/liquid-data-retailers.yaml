naftiko: 1.0.0-alpha2
info:
  label: Circana Liquid Data API — Retailers
  description: 'Circana Liquid Data API — Retailers. 1 operations. Lead operation: Circana List Retailers. Self-contained
    Naftiko capability covering one Circana business surface.'
  tags:
  - Circana
  - Retailers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIRCANA_API_KEY: CIRCANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: liquid-data-retailers
    baseUri: https://api.circana.com/liquid-data/v1
    description: Circana Liquid Data API — Retailers business capability. Self-contained, no shared references.
    resources:
    - name: retailers
      path: /retailers
      operations:
      - name: listretailers
        method: GET
        description: Circana List Retailers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: query
          type: string
          description: Retail channel filter
        - name: search
          in: query
          type: string
          description: Search term to filter retailer names
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return
    authentication:
      type: bearer
      token: '{{env.CIRCANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: liquid-data-retailers-rest
    port: 8080
    description: REST adapter for Circana Liquid Data API — Retailers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/retailers
      name: retailers
      description: REST surface for retailers.
      operations:
      - method: GET
        name: listretailers
        description: Circana List Retailers
        call: liquid-data-retailers.listretailers
        with:
          channel: rest.channel
          search: rest.search
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: liquid-data-retailers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Circana Liquid Data API — Retailers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: circana-list-retailers
      description: Circana List Retailers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: liquid-data-retailers.listretailers
      with:
        channel: tools.channel
        search: tools.search
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
