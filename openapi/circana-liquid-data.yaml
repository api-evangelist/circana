components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained through Circana authentication
  schemas:
    POSDataResponse:
      type: object
      description: Point-of-sale data response containing sales metrics
      properties:
        data:
          type: array
          description: Array of POS data records
          items:
            $ref: '#/components/schemas/POSRecord'
        pagination:
          $ref: '#/components/schemas/Pagination'
    POSRecord:
      type: object
      description: Individual point-of-sale data record
      properties:
        period:
          type: string
          description: Time period identifier
          example: '2026-W01'
        category:
          type: string
          description: Product category name
          example: Beverages
        brand:
          type: string
          description: Brand name
          example: Example Brand
        upc:
          type: string
          description: Universal Product Code
          example: '012345678901'
        dollar_sales:
          type: number
          format: double
          description: Total dollar sales for the period
          example: 125340.50
        unit_sales:
          type: integer
          description: Total unit sales for the period
          example: 45230
        volume_sales:
          type: number
          format: double
          description: Total volume sales (equivalent units)
          example: 67845.0
        avg_price:
          type: number
          format: double
          description: Average selling price
          example: 2.77
        distribution_pct:
          type: number
          format: double
          description: Percentage of stores carrying the product
          example: 85.3
    MarketShareResponse:
      type: object
      description: Market share data response
      properties:
        data:
          type: array
          description: Array of market share records
          items:
            $ref: '#/components/schemas/MarketShareRecord'
        pagination:
          $ref: '#/components/schemas/Pagination'
    MarketShareRecord:
      type: object
      description: Individual market share data record
      properties:
        brand:
          type: string
          description: Brand name
          example: Example Brand A
        dollar_share:
          type: number
          format: double
          description: Dollar market share percentage
          example: 24.5
        unit_share:
          type: number
          format: double
          description: Unit market share percentage
          example: 22.1
        share_change:
          type: number
          format: double
          description: Share change vs prior period in percentage points
          example: 1.2
        period:
          type: string
          description: Time period identifier
          example: '2026-Q1'
    ConsumerPurchaseResponse:
      type: object
      description: Consumer purchase data response
      properties:
        data:
          type: array
          description: Array of consumer purchase records
          items:
            $ref: '#/components/schemas/ConsumerPurchaseRecord'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ConsumerPurchaseRecord:
      type: object
      description: Individual consumer purchase data record
      properties:
        segment:
          type: string
          description: Consumer demographic segment
          example: 18-34
        category:
          type: string
          description: Product category name
          example: Beverages
        penetration_pct:
          type: number
          format: double
          description: Category penetration percentage
          example: 72.5
        buy_rate:
          type: number
          format: double
          description: Average purchase frequency
          example: 3.2
        avg_spend:
          type: number
          format: double
          description: Average spend per buyer
          example: 15.80
        trips_per_buyer:
          type: number
          format: double
          description: Average shopping trips per buyer
          example: 4.1
        channel:
          type: string
          description: Retail channel
          example: grocery
    ConsumerSegmentResponse:
      type: object
      description: Consumer segmentation response
      properties:
        data:
          type: array
          description: Array of consumer segment records
          items:
            $ref: '#/components/schemas/ConsumerSegment'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ConsumerSegment:
      type: object
      description: Consumer segment definition
      properties:
        segment_id:
          type: string
          description: Unique segment identifier
          example: seg-001
        name:
          type: string
          description: Segment name
          example: Health-Conscious Shoppers
        size_pct:
          type: number
          format: double
          description: Percentage of total market population
          example: 18.5
        avg_basket_size:
          type: number
          format: double
          description: Average basket size in dollars
          example: 42.30
        preferred_channels:
          type: array
          description: Preferred shopping channels
          items:
            type: string
          example:
            - grocery
            - online
        key_categories:
          type: array
          description: Top categories for this segment
          items:
            type: string
          example:
            - Organic Foods
            - Natural Beverages
    CategoryListResponse:
      type: object
      description: Category list response
      properties:
        data:
          type: array
          description: Array of category records
          items:
            $ref: '#/components/schemas/CategorySummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CategorySummary:
      type: object
      description: Category summary record
      properties:
        category_id:
          type: string
          description: Unique category identifier
          example: cpg-beverages
        name:
          type: string
          description: Category name
          example: Beverages
        parent_id:
          type: string
          description: Parent category identifier
          example: cpg
        industry:
          type: string
          description: Industry vertical
          example: cpg
        level:
          type: integer
          description: Depth level in the category hierarchy
          example: 2
        subcategory_count:
          type: integer
          description: Number of subcategories
          example: 15
    CategoryDetail:
      type: object
      description: Detailed category information
      properties:
        category_id:
          type: string
          description: Unique category identifier
          example: cpg-beverages
        name:
          type: string
          description: Category name
          example: Beverages
        description:
          type: string
          description: Category description
          example: All beverage categories including carbonated, juice, water, and energy drinks
        parent_id:
          type: string
          description: Parent category identifier
          example: cpg
        industry:
          type: string
          description: Industry vertical
          example: cpg
        level:
          type: integer
          description: Depth level in the category hierarchy
          example: 2
        subcategories:
          type: array
          description: Direct subcategories
          items:
            $ref: '#/components/schemas/CategorySummary'
        data_coverage:
          $ref: '#/components/schemas/DataCoverage'
    DataCoverage:
      type: object
      description: Data availability and coverage information
      properties:
        pos_available:
          type: boolean
          description: Whether POS data is available
          example: true
        panel_available:
          type: boolean
          description: Whether consumer panel data is available
          example: true
        earliest_date:
          type: string
          format: date
          description: Earliest available data date
          example: '2018-01-01'
        latest_date:
          type: string
          format: date
          description: Latest available data date
          example: '2026-03-31'
    BrandListResponse:
      type: object
      description: Brand list response
      properties:
        data:
          type: array
          description: Array of brand records
          items:
            $ref: '#/components/schemas/BrandSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
    BrandSummary:
      type: object
      description: Brand summary record
      properties:
        brand_id:
          type: string
          description: Unique brand identifier
          example: brand-500123
        name:
          type: string
          description: Brand name
          example: Example Cola
        manufacturer:
          type: string
          description: Manufacturer or parent company name
          example: Example Corp
        category:
          type: string
          description: Primary product category
          example: Carbonated Beverages
        upc_count:
          type: integer
          description: Number of UPCs under this brand
          example: 45
    BrandDetail:
      type: object
      description: Detailed brand information
      properties:
        brand_id:
          type: string
          description: Unique brand identifier
          example: brand-500123
        name:
          type: string
          description: Brand name
          example: Example Cola
        manufacturer:
          type: string
          description: Manufacturer or parent company name
          example: Example Corp
        categories:
          type: array
          description: Categories the brand is present in
          items:
            type: string
          example:
            - Carbonated Beverages
        upc_count:
          type: integer
          description: Number of UPCs under this brand
          example: 45
        market_presence:
          $ref: '#/components/schemas/MarketPresence'
    MarketPresence:
      type: object
      description: Brand market presence information
      properties:
        channels:
          type: integer
          description: Number of retail channels with distribution
          example: 6
        retailers:
          type: integer
          description: Number of retailers carrying the brand
          example: 120
        geographic_coverage:
          type: string
          description: Geographic coverage level
          example: national
    RetailerListResponse:
      type: object
      description: Retailer list response
      properties:
        data:
          type: array
          description: Array of retailer records
          items:
            $ref: '#/components/schemas/RetailerSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
    RetailerSummary:
      type: object
      description: Retailer summary record
      properties:
        retailer_id:
          type: string
          description: Unique retailer identifier
          example: ret-500123
        name:
          type: string
          description: Retailer name
          example: Example Market
        channel:
          type: string
          description: Primary retail channel
          example: grocery
        store_count:
          type: integer
          description: Number of store locations
          example: 450
        geographic_coverage:
          type: string
          description: Geographic coverage level
          example: national
    ReportListResponse:
      type: object
      description: Report list response
      properties:
        data:
          type: array
          description: Array of report records
          items:
            $ref: '#/components/schemas/ReportSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ReportSummary:
      type: object
      description: Report summary record
      properties:
        report_id:
          type: string
          description: Unique report identifier
          example: rpt-500123
        name:
          type: string
          description: Report name
          example: Q1 2026 Beverage Market Review
        status:
          type: string
          description: Report processing status
          enum:
            - draft
            - processing
            - completed
            - failed
          example: completed
        created_at:
          type: string
          format: date-time
          description: Report creation timestamp
          example: '2026-04-01T10:00:00Z'
        category:
          type: string
          description: Primary category for the report
          example: Beverages
        report_type:
          type: string
          description: Type of report
          example: market_review
    ReportDetail:
      type: object
      description: Detailed report information
      properties:
        report_id:
          type: string
          description: Unique report identifier
          example: rpt-500123
        name:
          type: string
          description: Report name
          example: Q1 2026 Beverage Market Review
        status:
          type: string
          description: Report processing status
          enum:
            - draft
            - processing
            - completed
            - failed
          example: completed
        created_at:
          type: string
          format: date-time
          description: Report creation timestamp
          example: '2026-04-01T10:00:00Z'
        completed_at:
          type: string
          format: date-time
          description: Report completion timestamp
          example: '2026-04-01T10:03:00Z'
        category:
          type: string
          description: Primary category for the report
          example: Beverages
        report_type:
          type: string
          description: Type of report
          example: market_review
        row_count:
          type: integer
          description: Number of data rows in completed report
          example: 4523
        estimated_completion:
          type: string
          format: date-time
          description: Estimated completion time for processing reports
          example: '2026-04-18T12:05:00Z'
    CreateReportRequest:
      type: object
      description: Request to create a new report
      required:
        - name
        - report_type
        - category_id
        - start_date
        - end_date
      properties:
        name:
          type: string
          description: Report name
          example: Q1 2026 Snacks Performance
        report_type:
          type: string
          description: Type of report to generate
          enum:
            - market_review
            - brand_performance
            - category_analysis
            - competitive_landscape
            - pricing_analysis
          example: market_review
        category_id:
          type: string
          description: Product category for the report
          example: cpg-snacks
        start_date:
          type: string
          format: date
          description: Report start date
          example: '2026-01-01'
        end_date:
          type: string
          format: date
          description: Report end date
          example: '2026-03-31'
        geography:
          type: string
          description: Geographic scope
          example: national
        metrics:
          type: array
          description: Metrics to include in the report
          items:
            type: string
          example:
            - dollar_sales
            - unit_sales
            - market_share
    CreateExportRequest:
      type: object
      description: Request to create a data export
      required:
        - source_type
        - source_id
        - format
      properties:
        source_type:
          type: string
          description: Type of data source to export
          enum:
            - report
            - query
            - dataset
          example: report
        source_id:
          type: string
          description: Identifier of the data source
          example: rpt-500123
        format:
          type: string
          description: Export file format
          enum:
            - csv
            - xlsx
            - json
            - parquet
          example: csv
        include_headers:
          type: boolean
          description: Whether to include column headers
          default: true
          example: true
    ExportDetail:
      type: object
      description: Export job details
      properties:
        export_id:
          type: string
          description: Unique export identifier
          example: exp-500123
        status:
          type: string
          description: Export processing status
          enum:
            - processing
            - completed
            - failed
          example: completed
        format:
          type: string
          description: Export file format
          example: csv
        created_at:
          type: string
          format: date-time
          description: Export creation timestamp
          example: '2026-04-18T12:00:00Z'
        completed_at:
          type: string
          format: date-time
          description: Export completion timestamp
          example: '2026-04-18T12:02:00Z'
        download_url:
          type: string
          format: uri
          description: URL to download the exported file
          example: https://exports.circana.com/exp-500123/data.csv
        file_size_bytes:
          type: integer
          description: Size of the exported file in bytes
          example: 2456789
    Pagination:
      type: object
      description: Pagination metadata
      properties:
        offset:
          type: integer
          description: Current offset position
          example: 0
        limit:
          type: integer
          description: Maximum records per page
          example: 100
        total:
          type: integer
          description: Total number of records available
          example: 4523
    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        error:
          type: string
          description: Error type identifier
          example: invalid_request
        message:
          type: string
          description: Human-readable error message
          example: The category_id parameter is required
        status:
          type: integer
          description: HTTP status code
          example: 400
        request_id:
          type: string
          description: Unique request identifier for troubleshooting
          example: req-a1b2c3d4
